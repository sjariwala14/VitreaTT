<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrea Advanced Visualization – Access Request</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #c41017;
            --accent-color: #ed1c24;
            --text-color: #333;
            --background-color: #f5f7fa;
            --card-bg: #fff;
            --border-color: #e0e0e0;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .login-header {
            background: var(--primary-color);
            padding: 30px;
            text-align: center;
            color: white;
        }
        .login-header img {
            height: 60px;
            margin-bottom: 15px;
        }
        .login-header h2 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        .login-header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }
        .login-body {
            padding: 30px;
        }
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            font-weight: 600;
            color: #777;
            transition: all 0.3s;
        }
        .tab.active {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
        }
        .tab-pane {
            display: none;
        }
        .tab-pane.active {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(196,16,23,0.1);
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-submit:hover {
            background: var(--accent-color);
        }
        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .status-message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status-message.loading {
            background: #e2e3e5;
            color: #383d41;
            display: block;
        }
        .footer-note {
            margin-top: 20px;
            text-align: center;
            font-size: 0.8rem;
            color: #777;
        }
        .footer-note a {
            color: var(--primary-color);
            text-decoration: none;
        }
        @media (max-width: 600px) {
            .login-header { padding: 20px; }
            .login-body { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="https://global.canon/en/corporate/logo/img/logo_01.png" alt="Canon Medical">
            <h2>Vitrea Advanced Visualization</h2>
            <p>Technical Training Portal</p>
        </div>
        <div class="login-body">
            <div class="tabs">
                <div class="tab active" data-tab="request">Request Access</div>
                <div class="tab" data-tab="verify">Verify Access Code</div>
            </div>

            <!-- Request Access Tab -->
            <div id="requestTab" class="tab-pane active">
                <form id="requestForm">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" required placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label for="email">Company Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="name@company.com">
                    </div>
                    <button type="submit" class="btn-submit" id="requestBtn">
                        <i class="fas fa-envelope"></i> Request Access
                    </button>
                </form>
                <div id="requestStatus" class="status-message"></div>
                <div class="footer-note">
                    <p>After submitting, you will receive an access code via email upon approval.</p>
                </div>
            </div>

            <!-- Verify Access Tab -->
            <div id="verifyTab" class="tab-pane">
                <form id="verifyForm">
                    <div class="form-group">
                        <label for="accessCode">Access Code</label>
                        <input type="text" id="accessCode" name="accessCode" required placeholder="Enter the code you received">
                    </div>
                    <button type="submit" class="btn-submit" id="verifyBtn">
                        <i class="fas fa-check-circle"></i> Verify & Access
                    </button>
                </form>
                <div id="verifyStatus" class="status-message"></div>
                <div class="footer-note">
                    <p>If you haven't received a code, please request access first.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        const RECIPIENT_EMAIL = "shailendrakumar.Jariwala@mi.medical.canon";
        const SECRET_CODE = "vitrea2026";  // <-- SET YOUR ACCESS CODE HERE

        // ===== FUNCTIONS =====
        async function getLocationData() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                return {
                    ip: data.ip || 'Unknown',
                    city: data.city || 'Unknown',
                    region: data.region || 'Unknown',
                    country: data.country_name || 'Unknown',
                    lat: data.latitude || 'N/A',
                    lon: data.longitude || 'N/A'
                };
            } catch (error) {
                console.error('Geolocation error:', error);
                return {
                    ip: 'Unable to retrieve',
                    city: 'Unknown',
                    region: 'Unknown',
                    country: 'Unknown',
                    lat: 'N/A',
                    lon: 'N/A'
                };
            }
        }

        // Build email body as requested
        function buildEmailBody(name, email, location) {
            const now = new Date().toUTCString();
            // Main request message
            let body = `Dear Shailendrakumar,\n\n`;
            body += `I would like to request access to the Vitrea Advanced Visualization V7.16.x Technical Training special interactive playbook.\n\n`;
            body += `Warm regards,\n${name}\n\n`;
            // Append technical details for your reference
            body += `--- Technical Information (for approval) ---\n`;
            body += `Name: ${name}\n`;
            body += `Email: ${email}\n`;
            body += `IP Address: ${location.ip}\n`;
            body += `Location: ${location.city}, ${location.region}, ${location.country}\n`;
            body += `Coordinates: ${location.lat}, ${location.lon}\n`;
            body += `Request Time: ${now}\n`;
            return body;
        }

        // Handle request submission
        document.getElementById('requestForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const requestBtn = document.getElementById('requestBtn');
            const statusDiv = document.getElementById('requestStatus');

            if (!name || !email) {
                statusDiv.className = 'status-message error';
                statusDiv.style.display = 'block';
                statusDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please fill in all fields.';
                return;
            }

            requestBtn.disabled = true;
            statusDiv.className = 'status-message loading';
            statusDiv.style.display = 'block';
            statusDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Preparing request...';

            try {
                const locationData = await getLocationData();
                const body = buildEmailBody(name, email, locationData);
                const subject = `Vitrea Playbook Access Request - ${name}`;
                
                // Open email client
                const mailtoLink = `mailto:${RECIPIENT_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                window.location.href = mailtoLink;

                statusDiv.className = 'status-message success';
                statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> Your email client should open. Please send the request. After approval, you will receive an access code.';
                setTimeout(() => {
                    statusDiv.innerHTML = '<i class="fas fa-clock"></i> Check your email for the access code later. You can close this message.';
                }, 5000);
                
                setTimeout(() => {
                    requestBtn.disabled = false;
                }, 10000);
            } catch (error) {
                console.error('Error:', error);
                statusDiv.className = 'status-message error';
                statusDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Could not prepare request. Please try again.';
                requestBtn.disabled = false;
            }
        });

        // Handle verification
        document.getElementById('verifyForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const enteredCode = document.getElementById('accessCode').value.trim();
            const statusDiv = document.getElementById('verifyStatus');

            if (!enteredCode) {
                statusDiv.className = 'status-message error';
                statusDiv.style.display = 'block';
                statusDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please enter the access code.';
                return;
            }

            if (enteredCode === SECRET_CODE) {
                statusDiv.className = 'status-message success';
                statusDiv.style.display = 'block';
                statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> Access granted! Redirecting...';
                setTimeout(() => {
                    window.location.href = 'https://sjariwala14.github.io/VitreaTT/Master.html';
                }, 2000);
            } else {
                statusDiv.className = 'status-message error';
                statusDiv.style.display = 'block';
                statusDiv.innerHTML = '<i class="fas fa-times-circle"></i> Invalid access code. Please request access if you haven\'t.';
            }
        });

        // Tab switching
        const tabs = document.querySelectorAll('.tab');
        const panes = document.querySelectorAll('.tab-pane');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.getAttribute('data-tab');
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                panes.forEach(pane => pane.classList.remove('active'));
                document.getElementById(`${target}Tab`).classList.add('active');
                document.getElementById('requestStatus').style.display = 'none';
                document.getElementById('verifyStatus').style.display = 'none';
            });
        });
    </script>
</body>
</html>
